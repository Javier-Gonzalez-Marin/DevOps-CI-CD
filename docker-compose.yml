services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: scooter_db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d scooter_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    volumes:
      - .:/app  
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/scooter_db
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy